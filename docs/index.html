<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kingnand Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Kingnand Blog',
      repo: 'https://github.com/kingnand',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 2,
      homepage: 'README.md',
      search: {
        maxAge: 86400000, // Expiration time for the search index in milliseconds (1 day)
        paths: 'auto', // Search all files automatically
        placeholder: 'Search documentation', // Placeholder text for the search input
        noData: 'No results found!', // Text to display when no results are found
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script> -->
</body>
</html>
